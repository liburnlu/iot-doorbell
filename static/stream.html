<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="bg-[#1c1c1c] text-white antialiased">

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#171717] border-r border-[#2e2e2e] flex flex-col h-screen transform -translate-x-full md:translate-x-0 md:relative md:flex">
            <div class="flex-1">
                <div class="p-6 flex items-center justify-between border-b border-[#2e2e2e] mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-bold text-black">D</div>
                        <span class="font-bold text-xl tracking-tight text-white">Doorbell</span>

                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400">

                    </button>
                </div>
                <nav class="px-4 space-y-1">
                    <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 hover:bg-[#2e2e2e] rounded-md text-sm font-medium text-gray-400 transition">
                        <span class="text-emerald-500/50">📁</span> Captures
                    </a>
                    <a href="/dashboard/stream" class="flex items-center gap-3 px-3 py-2 bg-[#2e2e2e] rounded-md text-sm font-medium text-white">
                        <span class="text-emerald-500">🔴</span> Live Stream
                    </a>
                    <a href="/dashboard/create-admin" class="flex items-center gap-3 px-3 py-2 hover:bg-[#2e2e2e] rounded-md text-sm font-medium text-gray-400 transition">
                        <span class="text-emerald-500">➕</span> Create New Admin
                    </a>
                     <a href="https://liburnlu.grafana.net/public-dashboards/f02526e15cdb43988c880bd80dd15155" target="_blank" class="flex items-center gap-3 px-3 py-2 hover:bg-[#2e2e2e] rounded-md text-sm font-medium text-emerald-500/80 transition border border-emerald-500/20 mt-4">
                        <span>📊</span> View Public Analytics
                    </a>
                </nav>
            </div>

            <div class="p-4 border-t border-[#2e2e2e] bg-[#1a1a1a]">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-[#2e2e2e] flex items-center justify-center text-emerald-500 border border-[#3e3e3e]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p id="user-name" class="text-sm font-medium text-white truncate">Admin User</p>
                        <p id="user-email" class="text-[10px] text-gray-500 truncate">loading...</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-3 py-2 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-md text-xs font-bold transition-all duration-200">
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#1c1c1c] w-full">
            <header class="h-16 border-b border-[#2e2e2e] flex items-center justify-between px-4 md:px-8 bg-[#171717] sticky top-0 z-40">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400 p-1 hover:bg-[#2e2e2e] rounded">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="flex items-center gap-2">
                        <span class="text-emerald-500 font-semibold text-sm">Live Feed</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-bold text-emerald-500 tracking-widest uppercase">Live</span>
                </div>
            </header>

            <div class="p-4 md:p-8 flex-1 flex flex-col items-center justify-center">
                <div class="w-full max-w-5xl bg-black border border-[#2e2e2e] rounded-3xl overflow-hidden stream-glow aspect-video relative">
    <iframe 
        src="https://liburnlumani.tech:8889/cam1/?token=mysecretkey1234!" 
        class="w-full h-full border-none" 
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media; camera; microphone"
        allowfullscreen
        loading="lazy"
        scrolling="no">
    </iframe>
</div>
            </div>
        </main>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const isOpen = sidebar.classList.contains('translate-x-0');
            if (isOpen) {
                sidebar.classList.replace('translate-x-0', '-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.replace('-translate-x-full', 'translate-x-0');
                overlay.classList.remove('hidden');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/config.js"></script> 
    <script src="/static/script.js"></script>
</body>
