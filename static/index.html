<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doorbell Admin | Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-[#1c1c1c] text-white antialiased">
    <div class="flex h-screen overflow-hidden">

        
        
        <aside class="w-64 bg-[#171717] border-r border-[#2e2e2e] flex flex-col h-screen">
            <div class="flex-1">
                <div class="p-6 flex items-center gap-3 border-b border-[#2e2e2e] mb-4">
                    <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-bold text-black">D</div>
                    <span class="font-bold text-xl tracking-tight text-white">Doorbell</span>
                </div>
                <nav class="px-4 space-y-1">
                    <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 bg-[#2e2e2e] rounded-md text-sm font-medium text-white">
                        <span class="text-emerald-500">📁</span> Captures
                    </a>
                    </nav>
            </div>

            <div class="p-4 border-t border-[#2e2e2e] bg-[#1a1a1a]">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-[#2e2e2e] flex items-center justify-center text-emerald-500 border border-[#3e3e3e]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p id="user-name" class="text-sm font-medium text-white truncate">Admin User</p>
                        <p id="user-email" class="text-[10px] text-gray-500 truncate">loading...</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-3 py-2 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-md text-xs font-bold transition-all duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#1c1c1c]">
            


            <header class="h-16 border-b border-[#2e2e2e] flex items-center justify-between px-8 bg-[#171717]">
    <div class="flex items-center gap-2">
        <span class="text-gray-500 text-sm">Storage /</span>
        <span class="text-emerald-500 font-semibold text-sm">captures</span>
    </div>

    <div class="flex items-center bg-[#262626] border border-[#3e3e3e] rounded-md overflow-hidden">
        <button onclick="changePage(-1)" class="px-4 py-2 hover:bg-[#333] text-gray-300 text-xs border-r border-[#3e3e3e] transition-colors">
            Back
        </button>
        <span id="pageLabel" class="px-6 py-2 text-xs font-mono text-white min-w-[100px] text-center">
            Page 1
        </span>
        <button onclick="changePage(1)" class="px-4 py-2 hover:bg-[#333] text-gray-300 text-xs transition-colors">
            Next
        </button>
         </div>
    </header>

            <div class="p-8 overflow-y-auto">
                <div id="image-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
                    </div>
            </div>
        </main>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/config.js"></script> <script src="/static/script.js"></script>
</body>
</html>
