<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doorbell Admin | Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-[#1c1c1c] text-white antialiased">
    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-[#171717] border-r border-[#2e2e2e] flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-bold text-black">D</div>
                <span class="font-bold text-xl tracking-tight">Doorbell</span>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="#" class="flex items-center gap-3 px-3 py-2 bg-[#2e2e2e] rounded-md text-sm font-medium">
                    <span class="text-emerald-500">📁</span> Captures
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-[#2e2e2e] hover:text-white rounded-md text-sm transition">
                    <span>📹</span> Live Stream
                </a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col bg-[#1c1c1c]">
            


            <header class="h-16 border-b border-[#2e2e2e] flex items-center justify-between px-8 bg-[#171717]">
    <div class="flex items-center gap-2">
        <span class="text-gray-500 text-sm">Storage /</span>
        <span class="text-emerald-500 font-semibold text-sm">captures</span>
    </div>

    <div class="flex items-center bg-[#262626] border border-[#3e3e3e] rounded-md overflow-hidden">
        <button onclick="changePage(-1)" class="px-4 py-2 hover:bg-[#333] text-gray-300 text-xs border-r border-[#3e3e3e] transition-colors">
            Back
        </button>
        <span id="pageLabel" class="px-6 py-2 text-xs font-mono text-white min-w-[100px] text-center">
            Page 1
        </span>
        <button onclick="changePage(1)" class="px-4 py-2 hover:bg-[#333] text-gray-300 text-xs transition-colors">
            Next
        </button>
         </div>
    </header>

            <div class="p-8 overflow-y-auto">
                <div id="image-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
                    </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
