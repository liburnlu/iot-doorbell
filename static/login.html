<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Doorbell Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1c1c1c] flex items-center justify-center min-h-screen px-4">
    
    <div class="bg-[#232323] p-6 sm:p-8 rounded-lg border border-[#2e2e2e] w-full max-w-md shadow-2xl">
        <div class="flex justify-center mb-6">
            <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center font-bold text-black text-2xl shadow-[0_0_20px_rgba(16,185,129,0.2)]">D</div>
        </div>
        
        <h2 class="text-white text-2xl font-bold mb-2 text-center">Welcome Back</h2>
        <p class="text-gray-500 text-sm text-center mb-8">Sign in to view your doorbell captures</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase tracking-wider font-semibold">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full p-3 bg-[#171717] border border-[#2e2e2e] rounded text-white outline-none focus:border-emerald-500 transition-all duration-200 focus:ring-1 focus:ring-emerald-500/50"
                    placeholder="admin@example.com">
            </div>
            
            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase tracking-wider font-semibold">Password</label>
                <input type="password" id="password" required 
                    class="w-full p-3 bg-[#171717] border border-[#2e2e2e] rounded text-white outline-none focus:border-emerald-500 transition-all duration-200 focus:ring-1 focus:ring-emerald-500/50"
                    placeholder="••••••••">
            </div>

            <p id="statusMsg" class="text-center text-sm min-h-[1.25rem]"></p>

            <button type="submit" id="submitBtn"
                class="w-full bg-emerald-500 text-black font-bold py-4 rounded mt-2 hover:bg-emerald-400 transition transform active:scale-[0.98] shadow-lg shadow-emerald-500/10">
                Sign In
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/config.js"></script>
    <script>
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('statusMsg');
            const btn = document.getElementById('submitBtn');

            // Visual feedback
            msg.innerText = "Authenticating...";
            msg.className = "text-gray-400 text-center text-sm";
            btn.innerText = "Please wait...";
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.innerText = error.message;
                msg.className = "text-red-500 text-center text-sm";
                btn.innerText = "Sign In";
                btn.disabled = false;
            } else {
                msg.innerText = "Success! Redirecting...";
                msg.className = "text-emerald-500 text-center text-sm";
                localStorage.setItem('sb-access-token', data.session.access_token);
                
                // Small delay so the user sees the success message
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 800);
            }
        });
    </script>
</body>
</html>
